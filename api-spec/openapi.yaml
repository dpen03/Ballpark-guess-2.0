openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Ballpark Predict API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: games
  - name: players
  - name: predictions
  - name: atbats
  - name: leaderboard
  - name: mlb
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /games:
    post:
      operationId: createGame
      tags: [games]
      summary: Create a new game room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGameInput"
      responses:
        "201":
          description: Game created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"

  /games/{code}:
    get:
      operationId: getGameByCode
      tags: [games]
      summary: Get a game by its room code
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Game state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameState"
        "404":
          description: Not found

  /games/{code}/join:
    post:
      operationId: joinGame
      tags: [players]
      summary: Join a game as a player
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinGameInput"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /games/{code}/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get current leaderboard for a game
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /games/{code}/atbats:
    get:
      operationId: listAtBats
      tags: [atbats]
      summary: List at-bats for a game (newest first)
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: At-bats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AtBat"
    post:
      operationId: createAtBat
      tags: [atbats]
      summary: Host opens a new at-bat for predictions
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAtBatInput"
      responses:
        "201":
          description: At-bat created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtBat"

  /games/{code}/atbats/current:
    get:
      operationId: getCurrentAtBat
      tags: [atbats]
      summary: Get the active at-bat awaiting an outcome
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current at-bat or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentAtBat"

  /atbats/{atBatId}/resolve:
    post:
      operationId: resolveAtBat
      tags: [atbats]
      summary: Host records the actual outcome of an at-bat
      parameters:
        - in: path
          name: atBatId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveAtBatInput"
      responses:
        "200":
          description: At-bat resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtBatResolution"

  /atbats/{atBatId}/predictions:
    post:
      operationId: predictAtBat
      tags: [predictions]
      summary: Submit a player's prediction for an at-bat
      parameters:
        - in: path
          name: atBatId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PredictAtBatInput"
      responses:
        "200":
          description: Prediction saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AtBatPrediction"

  /atbats/{atBatId}/predictions/summary:
    get:
      operationId: getAtBatPredictionSummary
      tags: [predictions]
      summary: Get aggregate count of predictions per outcome for an at-bat
      parameters:
        - in: path
          name: atBatId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PredictionTally"

  /games/{code}/players/{playerId}/picks:
    get:
      operationId: getPlayerPicks
      tags: [predictions]
      summary: Get a player's pre-game picks (winner, HR hitters, walks, K's)
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
        - in: path
          name: playerId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Player picks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerPicks"
    put:
      operationId: savePlayerPicks
      tags: [predictions]
      summary: Save / update a player's pre-game picks
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
        - in: path
          name: playerId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SavePlayerPicksInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerPicks"

  /games/{code}/players/{playerId}/inning-guesses:
    get:
      operationId: getInningGuesses
      tags: [predictions]
      summary: Get a player's per-inning run guesses
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
        - in: path
          name: playerId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Inning guesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InningGuess"
    put:
      operationId: saveInningGuess
      tags: [predictions]
      summary: Save a single inning run guess
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
        - in: path
          name: playerId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveInningGuessInput"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InningGuess"

  /mlb/schedule:
    get:
      operationId: getMlbSchedule
      tags: [mlb]
      summary: List MLB games for a given date (defaults to today)
      parameters:
        - in: query
          name: date
          required: false
          schema:
            type: string
            description: YYYY-MM-DD; defaults to today (US/Eastern)
      responses:
        "200":
          description: MLB games
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MlbScheduledGame"

  /mlb/games/{gamePk}/join:
    post:
      operationId: joinMlbGame
      tags: [mlb]
      summary: Find-or-create the shared room for an MLB game and join it
      parameters:
        - in: path
          name: gamePk
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinMlbGameInput"
      responses:
        "200":
          description: Joined the shared room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinMlbGameResult"

  /mlb/games/{gamePk}/roster:
    get:
      operationId: getMlbRoster
      tags: [mlb]
      summary: Roster (batters) for both teams of an MLB game, for HR-pick selection
      parameters:
        - in: path
          name: gamePk
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Roster
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlbRoster"

  /games/{code}/sync-mlb:
    post:
      operationId: syncGameWithMlb
      tags: [mlb]
      summary: Sync a linked game with its real MLB live feed
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MlbSyncResult"

  /games/{code}/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [leaderboard]
      summary: Recent at-bat outcomes and points awarded
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    PitchOutcome:
      type: string
      enum: [single, double, triple, home_run, out, walk, strikeout]

    Half:
      type: string
      enum: [top, bottom]

    GameStatus:
      type: string
      enum: [lobby, live, final]

    CreateGameInput:
      type: object
      required: [hostName, awayTeam, homeTeam]
      properties:
        hostName:
          type: string
          minLength: 1
          maxLength: 30
        awayTeam:
          type: string
          minLength: 1
          maxLength: 30
        homeTeam:
          type: string
          minLength: 1
          maxLength: 30
        venue:
          type: string
          maxLength: 60
        mlbGamePk:
          type: integer
          nullable: true
          description: Optional link to a real MLB game (StatsAPI gamePk)

    Game:
      type: object
      required: [id, code, awayTeam, homeTeam, status, hostPlayerId, createdAt]
      properties:
        id: { type: string }
        code: { type: string }
        awayTeam: { type: string }
        homeTeam: { type: string }
        venue: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/GameStatus" }
        hostPlayerId: { type: string }
        mlbGamePk: { type: integer, nullable: true }
        mlbDetailedState: { type: string, nullable: true }
        mlbAwayScore: { type: integer, nullable: true }
        mlbHomeScore: { type: integer, nullable: true }
        mlbCurrentInning: { type: integer, nullable: true }
        mlbCurrentHalf: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    Player:
      type: object
      required: [id, gameId, name, avatar, isHost, totalScore, joinedAt]
      properties:
        id: { type: string }
        gameId: { type: string }
        name: { type: string }
        avatar: { type: string }
        isHost: { type: boolean }
        totalScore: { type: integer }
        joinedAt: { type: string, format: date-time }

    JoinGameInput:
      type: object
      required: [name, avatar]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 20
        avatar:
          type: string

    GameState:
      type: object
      required: [game, players]
      properties:
        game: { $ref: "#/components/schemas/Game" }
        players:
          type: array
          items: { $ref: "#/components/schemas/Player" }

    AtBat:
      type: object
      required: [id, gameId, batterName, team, inning, half, status, createdAt]
      properties:
        id: { type: string }
        gameId: { type: string }
        batterName: { type: string }
        team: { type: string }
        inning: { type: integer, minimum: 1, maximum: 12 }
        half: { $ref: "#/components/schemas/Half" }
        status:
          type: string
          enum: [open, resolved]
        actualOutcome:
          allOf:
            - $ref: "#/components/schemas/PitchOutcome"
          nullable: true
        createdAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }

    CurrentAtBat:
      type: object
      required: [atBat]
      properties:
        atBat:
          allOf:
            - $ref: "#/components/schemas/AtBat"
          nullable: true

    CreateAtBatInput:
      type: object
      required: [batterName, team, inning, half]
      properties:
        batterName:
          type: string
          minLength: 1
          maxLength: 40
        team: { type: string, minLength: 1, maxLength: 30 }
        inning: { type: integer, minimum: 1, maximum: 12 }
        half: { $ref: "#/components/schemas/Half" }

    ResolveAtBatInput:
      type: object
      required: [outcome]
      properties:
        outcome: { $ref: "#/components/schemas/PitchOutcome" }

    AtBatResolution:
      type: object
      required: [atBat, awarded]
      properties:
        atBat: { $ref: "#/components/schemas/AtBat" }
        awarded:
          type: array
          items:
            type: object
            required: [playerId, playerName, points, correct]
            properties:
              playerId: { type: string }
              playerName: { type: string }
              points: { type: integer }
              correct: { type: boolean }

    PredictAtBatInput:
      type: object
      required: [playerId, prediction]
      properties:
        playerId: { type: string }
        prediction: { $ref: "#/components/schemas/PitchOutcome" }

    AtBatPrediction:
      type: object
      required: [id, atBatId, playerId, prediction, createdAt]
      properties:
        id: { type: string }
        atBatId: { type: string }
        playerId: { type: string }
        prediction: { $ref: "#/components/schemas/PitchOutcome" }
        createdAt: { type: string, format: date-time }

    PredictionTally:
      type: object
      required: [outcome, count]
      properties:
        outcome: { $ref: "#/components/schemas/PitchOutcome" }
        count: { type: integer }

    PlayerPicks:
      type: object
      required: [playerId, gameId, hrHitters]
      properties:
        playerId: { type: string }
        gameId: { type: string }
        winnerTeam: { type: string, nullable: true }
        awayFinalScore: { type: integer, nullable: true }
        homeFinalScore: { type: integer, nullable: true }
        hrHitters:
          type: array
          items: { type: string }
        totalWalks: { type: integer, nullable: true }
        totalStrikeouts: { type: integer, nullable: true }

    SavePlayerPicksInput:
      type: object
      properties:
        winnerTeam: { type: string, nullable: true }
        awayFinalScore: { type: integer, minimum: 0, maximum: 30, nullable: true }
        homeFinalScore: { type: integer, minimum: 0, maximum: 30, nullable: true }
        hrHitters:
          type: array
          items: { type: string, maxLength: 40 }
          maxItems: 6
        totalWalks: { type: integer, minimum: 0, maximum: 30, nullable: true }
        totalStrikeouts: { type: integer, minimum: 0, maximum: 30, nullable: true }

    InningGuess:
      type: object
      required: [playerId, gameId, inning, half, runs]
      properties:
        playerId: { type: string }
        gameId: { type: string }
        inning: { type: integer, minimum: 1, maximum: 12 }
        half: { $ref: "#/components/schemas/Half" }
        runs: { type: integer, minimum: 0, maximum: 15 }

    SaveInningGuessInput:
      type: object
      required: [inning, half, runs]
      properties:
        inning: { type: integer, minimum: 1, maximum: 12 }
        half: { $ref: "#/components/schemas/Half" }
        runs: { type: integer, minimum: 0, maximum: 15 }

    LeaderboardEntry:
      type: object
      required: [playerId, name, avatar, totalScore, correctPicks, totalPicks, isHost]
      properties:
        playerId: { type: string }
        name: { type: string }
        avatar: { type: string }
        totalScore: { type: integer }
        correctPicks: { type: integer }
        totalPicks: { type: integer }
        isHost: { type: boolean }

    MlbScheduledGame:
      type: object
      required: [gamePk, awayTeam, homeTeam, venue, gameDate, detailedState, abstractGameState]
      properties:
        gamePk: { type: integer }
        awayTeam: { type: string }
        homeTeam: { type: string }
        venue: { type: string }
        gameDate: { type: string, format: date-time }
        detailedState: { type: string }
        abstractGameState: { type: string }
        awayScore: { type: integer, nullable: true }
        homeScore: { type: integer, nullable: true }

    JoinMlbGameInput:
      type: object
      required: [name, avatar]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 30
        avatar:
          type: string
          maxLength: 8

    JoinMlbGameResult:
      type: object
      required: [game, player]
      properties:
        game:
          $ref: "#/components/schemas/Game"
        player:
          $ref: "#/components/schemas/Player"

    MlbRosterPlayer:
      type: object
      required: [id, name, position]
      properties:
        id: { type: integer }
        name: { type: string }
        position: { type: string }
        jerseyNumber: { type: string, nullable: true }

    MlbRoster:
      type: object
      required: [awayTeam, homeTeam, away, home]
      properties:
        awayTeam: { type: string }
        homeTeam: { type: string }
        away:
          type: array
          items:
            $ref: "#/components/schemas/MlbRosterPlayer"
        home:
          type: array
          items:
            $ref: "#/components/schemas/MlbRosterPlayer"

    MlbSyncResult:
      type: object
      required: [linked, resolvedCount, openedCurrent]
      properties:
        linked: { type: boolean }
        message: { type: string, nullable: true }
        resolvedCount: { type: integer }
        openedCurrent: { type: boolean }
        gameStatus: { $ref: "#/components/schemas/GameStatus" }

    ActivityEvent:
      type: object
      required: [id, atBatId, batterName, inning, half, outcome, awardedCount, topScorer, createdAt]
      properties:
        id: { type: string }
        atBatId: { type: string }
        batterName: { type: string }
        inning: { type: integer }
        half: { $ref: "#/components/schemas/Half" }
        outcome: { $ref: "#/components/schemas/PitchOutcome" }
        awardedCount: { type: integer }
        topScorer:
          type: object
          nullable: true
          required: [playerId, name, points]
          properties:
            playerId: { type: string }
            name: { type: string }
            points: { type: integer }
        createdAt: { type: string, format: date-time }
